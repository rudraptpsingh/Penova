name: Penova
options:
  bundleIdPrefix: com.rudrapratapsingh
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  PenovaKit:
    path: PenovaKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.7.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: en
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Penova:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Penova/App
      - path: Penova/Features
      - path: Penova/Resources
        buildPhase: resources
    dependencies:
      - package: PenovaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova
        PRODUCT_NAME: Penova
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "11"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Penova/App/Penova.entitlements
        INFOPLIST_FILE: Penova/App/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1"

  PenovaMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PenovaMac/App
      - path: PenovaMac/Features
      - path: PenovaMac/Resources
        buildPhase: resources
    dependencies:
      - package: PenovaKit
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova.mac
        PRODUCT_NAME: Penova
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "11"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: PenovaMac/App/PenovaMac.entitlements
        INFOPLIST_FILE: PenovaMac/App/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  PenovaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PenovaTests
    dependencies:
      - target: Penova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova.tests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  PenovaMacUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PenovaMacUITests
        excludes:
          - "*.md"
    dependencies:
      - target: PenovaMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova.mac.uitests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_TARGET_NAME: PenovaMac

  PenovaMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PenovaMacTests
    dependencies:
      - package: PenovaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Penova:
    build:
      targets:
        Penova: all
        PenovaTests: [test]
    test:
      targets:
        - PenovaTests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release

  PenovaMac:
    build:
      targets:
        PenovaMac: all
        PenovaMacTests: [test]
        PenovaMacUITests: [test]
    test:
      targets:
        - PenovaMacTests
        - PenovaMacUITests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release
