name: Penova
options:
  bundleIdPrefix: com.rudrapratapsingh
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  PenovaKit:
    path: PenovaKit

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: en
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  Penova:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Penova/App
      - path: Penova/Features
      - path: Penova/Resources
        buildPhase: resources
    dependencies:
      - package: PenovaKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova
        PRODUCT_NAME: Penova
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Penova/App/Penova.entitlements
        INFOPLIST_FILE: Penova/App/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "1"

  PenovaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PenovaTests
    dependencies:
      - target: Penova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrapratapsingh.penova.tests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  Penova:
    build:
      targets:
        Penova: all
        PenovaTests: [test]
    test:
      targets:
        - PenovaTests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release
